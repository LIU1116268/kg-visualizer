<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>岗位能力知识图谱</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;background:#0a0e27;color:#e0e0e0;overflow:hidden}
#container{width:100vw;height:100vh;position:relative}
svg{width:100%;height:100%}
#toolbar{position:absolute;top:12px;left:12px;right:12px;display:flex;gap:8px;align-items:center;z-index:10;flex-wrap:wrap}
#toolbar h1{font-size:18px;font-weight:700;background:linear-gradient(135deg,#64b5f6,#ce93d8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-right:auto}
.btn{padding:6px 12px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.06);color:#ccc;border-radius:6px;cursor:pointer;font-size:12px;transition:all .2s;white-space:nowrap}
.btn:hover{background:rgba(255,255,255,.14)}
.btn.active{background:#3f51b5;border-color:#5c6bc0;color:#fff}
#searchInput{padding:6px 12px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#e0e0e0;border-radius:6px;font-size:12px;width:180px;outline:none}
#searchInput:focus{border-color:#5c6bc0}
#legend{position:absolute;bottom:20px;left:20px;background:rgba(15,18,40,.9);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:12px 16px;z-index:10;backdrop-filter:blur(10px)}
#legend .item{display:flex;align-items:center;gap:6px;margin:3px 0;font-size:11px}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
#detail{position:absolute;top:90px;right:16px;background:rgba(15,18,40,.93);border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:16px;max-width:340px;z-index:10;backdrop-filter:blur(10px);display:none;max-height:65vh;overflow-y:auto}
#detail h3{font-size:15px;margin-bottom:4px}
#detail .type-tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;margin-bottom:6px}
#detail p{font-size:12px;color:#aaa;line-height:1.5}
#detail .close-btn{position:absolute;top:6px;right:12px;cursor:pointer;font-size:16px;color:#888}
#tooltip{position:absolute;pointer-events:none;opacity:0;background:rgba(20,24,50,.95);border:1px solid rgba(255,255,255,.2);border-radius:6px;padding:6px 12px;font-size:12px;transition:opacity .15s;z-index:20;white-space:nowrap}
#stats{position:absolute;bottom:20px;right:20px;font-size:10px;color:#555;text-align:right;z-index:10}
#loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:100;font-size:16px;color:#888;display:none}
#urlbox{position:absolute;bottom:60px;right:20px;z-index:10;display:none}
#urlbox input{padding:6px 10px;border:1px solid rgba(255,255,255,.2);background:rgba(15,18,40,.9);color:#64b5f6;border-radius:6px;font-size:11px;width:300px;outline:none}
/* 学习任务卡 */
#learningView{position:absolute;top:0;left:0;right:0;bottom:0;overflow-y:auto;z-index:30;display:none;padding:80px 20px 40px;background:rgba(5,8,20,.97)}
#learningView .lt-header{text-align:center;margin-bottom:30px}
#learningView .lt-header h2{font-size:22px;background:linear-gradient(135deg,#64b5f6,#ce93d8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#learningView .lt-header p{color:#888;font-size:13px;margin-top:4px}
.lt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:20px;max-width:1400px;margin:0 auto}
.lt-card{background:rgba(20,25,50,.9);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:22px;transition:all .2s;position:relative}
.lt-card:hover{border-color:rgba(100,181,246,.4);box-shadow:0 4px 24px rgba(100,181,246,.1)}
.lt-card .lt-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;margin-bottom:10px}
.lt-card h3{font-size:16px;margin-bottom:4px}
.lt-card .lt-ref{font-size:11px;color:#666;margin-bottom:8px}
.lt-card .lt-scenario{font-size:13px;color:#bbb;background:rgba(255,255,255,.04);padding:12px;border-radius:8px;margin-bottom:12px;border-left:3px solid #42a5f5;line-height:1.7}
.lt-card h4{font-size:13px;color:#64b5f6;margin:14px 0 6px}
.lt-step{font-size:12px;padding:8px 12px;margin:4px 0;background:rgba(255,255,255,.03);border-radius:6px;display:flex;gap:10px;align-items:flex-start}
.lt-step .step-num{background:#3f51b5;color:#fff;width:22px;height:22px;border-radius:50%;text-align:center;line-height:22px;font-size:11px;flex-shrink:0}
.lt-step .step-dur{color:#888;font-size:10px;white-space:nowrap}
.lt-step .step-tip{color:#ffa726;font-size:10px;margin-top:2px}
.lt-tags{display:flex;flex-wrap:wrap;gap:4px;margin:8px 0}
.lt-tags span{font-size:10px;padding:2px 8px;border-radius:10px;background:rgba(102,187,106,.15);color:#66bb6a}
.lt-safety{font-size:11px;color:#ef5350;padding:6px 10px;background:rgba(239,83,80,.08);border-radius:6px;margin-top:8px}
.lt-resource{font-size:11px;display:flex;align-items:center;gap:6px;padding:3px 0}
.lt-resource .res-icon{font-size:14px}
.lt-assessment{font-size:12px;color:#ce93d8;margin-top:8px;padding:8px 10px;background:rgba(206,147,216,.06);border-radius:6px}
#closeLearning{position:fixed;top:16px;right:20px;z-index:31;padding:8px 16px;border:1px solid rgba(255,255,255,.2);background:rgba(15,18,40,.9);color:#ccc;border-radius:8px;cursor:pointer;font-size:13px}
#closeLearning:hover{background:rgba(255,255,255,.14)}
</style>
</head>
<body>
<div id="container">
<div id="toolbar">
  <h1>🧠 岗位能力知识图谱</h1>
  <input id="searchInput" type="text" placeholder="搜索节点..." />
  <button class="btn active" onclick="filterLayer('all')">全部</button>
  <button class="btn" onclick="filterLayer('task')">任务</button>
  <button class="btn" onclick="filterLayer('competency')">能力</button>
  <button class="btn" onclick="filterLayer('skill')">技能</button>
  <button class="btn" onclick="showLearningView()">📋 学习任务卡</button>
  <button class="btn" onclick="copyShareURL()">🔗 复制分享链接</button>
  <button class="btn" onclick="fitGraph()">🔍 重置</button>
</div>

<div id="legend">
  <div class="item"><span class="legend-dot" style="background:#ff6b6b"></span> 产业链/岗位群/岗位</div>
  <div class="item"><span class="legend-dot" style="background:#ffa726"></span> 工作任务</div>
  <div class="item"><span class="legend-dot" style="background:#42a5f5"></span> 能力项</div>
  <div class="item"><span class="legend-dot" style="background:#66bb6a"></span> 技能/知识点</div>
</div>

<div id="detail">
  <span class="close-btn" onclick="closeDetail()">✕</span>
  <div id="detailContent"></div>
</div>

<div id="tooltip"></div>
<div id="stats"></div>
<div id="loading">⏳ 加载图谱数据...</div>
<svg id="graph"></svg>

<!-- 学习任务卡视图 -->
<button id="closeLearning" onclick="showGraphView()">✕ 返回图谱</button>
<div id="learningView">
  <div class="lt-header">
    <h2>📋 学习任务卡</h2>
    <p>基于“以岗定教”理念，将企业工作任务转化为课堂教学实训任务</p>
  </div>
  <div class="lt-grid" id="learningGrid"></div>
</div>

</div>

<script>
// ======================== URL数据解压 ========================
async function decompressFromURL() {
  const params = new URLSearchParams(window.location.search);
  const d = params.get('d');
  if (!d) return null;

  try {
    // URL-safe base64 → 原始 base64 → 二进制 → zlib解压
    let b64 = d.replace(/-/g, '+').replace(/_/g, '/');
    while (b64.length % 4) b64 += '=';
    const binary = atob(b64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) {
      bytes[i] = binary.charCodeAt(i);
    }
    const ds = new DecompressionStream('deflate');
    const writer = ds.writable.getWriter();
    const reader = ds.readable.getReader();
    writer.write(bytes);
    writer.close();
    const chunks = [];
    let done = false;
    while (!done) {
      const { value, done: d } = await reader.read();
      if (d) done = true;
      if (value) chunks.push(value);
    }
    const totalLength = chunks.reduce((a, b) => a + b.length, 0);
    const result = new Uint8Array(totalLength);
    let offset = 0;
    for (const chunk of chunks) {
      result.set(chunk, offset);
      offset += chunk.length;
    }
    const text = new TextDecoder().decode(result);
    return JSON.parse(text);
  } catch(e) {
    console.error('URL数据解压失败:', e);
    return null;
  }
}

// ======================== 颜色映射 ========================
const COLORS = {
  industry_chain:'#ff6b6b',job_group:'#ff6b6b',job:'#ff6b6b',
  task:'#ffa726',competency:'#42a5f5',skill:'#66bb6a'
};
const LAYERS = {
  industry_chain:'产业链',job_group:'岗位群',job:'岗位',
  task:'工作任务',competency:'能力项',skill:'技能/知识点'
};

// ======================== 构建图谱 ========================
let simulation, svg, g, nodeGroup, labelGroup, linkGroup;
let graphData = { nodes: [], links: [] };
let currentData = null;

function buildGraph(data) {
  const nodes = [], links = [];
  const nodeMap = new Map();

  function addNode(id, label, type, entity) {
    if (!id || nodeMap.has(id)) return;
    nodes.push({id, label, type, entity});
    nodeMap.set(id, true);
  }

  const e = data.entities || {};
  addNode(e.industry_chain?.name, e.industry_chain?.name, 'industry_chain', e.industry_chain);
  addNode(e.job_group?.name, e.job_group?.name, 'job_group', e.job_group);
  addNode(e.job?.name || data.meta?.job_title, e.job?.name || data.meta?.job_title, 'job', e.job);

  (e.tasks||[]).forEach(t => addNode(t.id, t.name, 'task', t));
  (e.competencies||[]).forEach(c => addNode(c.id, c.name, 'competency', c));
  (e.skills||[]).forEach(s => addNode(s.id, s.name, 'skill', s));

  (data.edges||[]).forEach(edge => {
    if (nodeMap.has(edge.source) && nodeMap.has(edge.target)) {
      links.push({source: edge.source, target: edge.target, relation: edge.relation});
      if (!nodeMap.has(edge.source)) addNode(edge.source, edge.source, 'task', {});
      if (!nodeMap.has(edge.target)) addNode(edge.target, edge.target, 'task', {});
    }
  });

  // 过滤掉没边的孤立节点
  const linkedIds = new Set();
  links.forEach(l => { linkedIds.add(l.source); linkedIds.add(l.target); });
  const filteredNodes = nodes.filter(n => linkedIds.has(n.id) || n.type === 'job' || n.type === 'job_group' || n.type === 'industry_chain');

  return { nodes: filteredNodes, links };
}

function renderGraph() {
  const container = document.getElementById('container');
  const w = container.clientWidth, h = container.clientHeight;

  d3.select('#graph').selectAll('*').remove();
  svg = d3.select('#graph').attr('width', w).attr('height', h);

  const zoom = d3.zoom().scaleExtent([0.12, 4]).on('zoom', e => g.attr('transform', e.transform));
  svg.call(zoom);

  g = svg.append('g');

  g.append('defs').append('marker')
    .attr('id','arrow').attr('viewBox','0 -5 10 10')
    .attr('refX',22).attr('refY',0).attr('markerWidth',5).attr('markerHeight',5)
    .attr('orient','auto')
    .append('path').attr('d','M0,-5L10,0L0,5').attr('fill','rgba(255,255,255,.15)');

  linkGroup = g.append('g');
  linkGroup.selectAll('line').data(graphData.links).join('line')
    .attr('stroke','rgba(255,255,255,.08)').attr('stroke-width',1)
    .attr('marker-end','url(#arrow)');

  nodeGroup = g.append('g');
  const nodeElems = nodeGroup.selectAll('g').data(graphData.nodes).join('g')
    .attr('cursor','pointer')
    .call(d3.drag()
      .on('start',(e,d) => { if(!e.active) simulation.alphaTarget(.3).restart(); d.fx=d.x;d.fy=d.y; })
      .on('drag',(e,d) => { d.fx=e.x;d.fy=e.y; })
      .on('end',(e,d) => { if(!e.active) simulation.alphaTarget(0); d.fx=null;d.fy=null; }));

  nodeElems.append('circle')
    .attr('r', d => d.type==='skill'?6:d.type==='competency'?10:d.type==='task'?14:18)
    .attr('fill', d => COLORS[d.type]||'#888')
    .attr('stroke','rgba(255,255,255,.25)').attr('stroke-width',1.5);

  nodeElems.on('click',(e,d) => showDetail(d))
    .on('mouseenter',(e,d) => {
      d3.select('#tooltip').style('opacity',1)
        .style('left',(e.pageX+12)+'px').style('top',(e.pageY-12)+'px')
        .html(`<strong>${d.label}</strong><br><span style="color:#888;font-size:10px">${LAYERS[d.type]||''}</span>`);
    })
    .on('mouseleave',() => d3.select('#tooltip').style('opacity',0));

  labelGroup = g.append('g');
  labelGroup.selectAll('text').data(graphData.nodes).join('text')
    .text(d => d.label.length>10?d.label.slice(0,10)+'…':d.label)
    .attr('font-size',d => d.type==='skill'?8:d.type==='task'?10:12)
    .attr('fill','#ccc').attr('text-anchor','middle')
    .attr('dy',d => d.type==='skill'?-10:d.type==='competency'?-16:-22)
    .attr('pointer-events','none');

  simulation = d3.forceSimulation(graphData.nodes)
    .force('link',d3.forceLink(graphData.links).id(d=>d.id)
      .distance(d=>{
        if(d.source.type==='competency'&&d.target.type==='skill')return 50;
        if(d.source.type==='task'&&d.target.type==='competency')return 65;
        return 80;
      })
      .strength(d=>d.source.type==='competency'&&d.target.type==='skill'?.8:.5)
    )
    .force('charge',d3.forceManyBody().strength(d=>{
      if(d.type==='skill')return -80;
      if(d.type==='competency')return -200;
      if(d.type==='task')return -300;
      return -400;
    }))
    .force('center',d3.forceCenter(w/2,h/2))
    .force('collision',d3.forceCollide().radius(d=>{
      if(d.type==='skill')return 12;
      if(d.type==='competency')return 22;
      return 35;
    }))
    .force('x',d3.forceX(w/2).strength(.03))
    .force('y',d3.forceY(h/2).strength(.03))
    .on('tick',() => {
      linkGroup.selectAll('line').attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
      nodeElems.attr('transform',d=>`translate(${d.x},${d.y})`);
      labelGroup.selectAll('text').attr('x',d=>d.x).attr('y',d=>d.y);
    });

  updateStats();
}

function showDetail(d) {
  const e = d.entity || {};
  let extra = '';
  if(e.category) extra+=`<p><b>分类:</b> ${e.category}</p>`;
  if(e.data_type) extra+=`<p><b>数据类型:</b> ${e.data_type}</p>`;
  if(e.level) extra+=`<p><b>等级:</b> ${e.level}</p>`;
  if(e.type&&d.type==='competency') extra+=`<p><b>能力类型:</b> ${e.type}</p>`;
  if(e.type&&d.type==='skill') extra+=`<p><b>技能类型:</b> ${e.type}</p>`;
  if(e.tool_related) extra+=`<p><b>工具:</b> ${e.tool_related}</p>`;
  if(e.difficulty) extra+=`<p><b>难度:</b> ${e.difficulty}</p>`;
  if(e.related_positions?.length) extra+=`<p><b>相关岗位:</b> ${e.related_positions.join(', ')}</p>`;
  if(e.related_task_ids?.length) extra+=`<p><b>关联任务:</b> ${e.related_task_ids.join(', ')}</p>`;
  if(e.related_competency_ids?.length) extra+=`<p><b>关联能力:</b> ${e.related_competency_ids.join(', ')}</p>`;

  document.getElementById('detailContent').innerHTML = `
    <h3 style="color:${COLORS[d.type]}">${d.label}</h3>
    <span class="type-tag" style="background:${COLORS[d.type]}22;color:${COLORS[d.type]}">${LAYERS[d.type]}</span>
    <p style="margin-top:6px">${e.description||'暂无描述'}</p>${extra}`;
  document.getElementById('detail').style.display='block';
}
function closeDetail(){document.getElementById('detail').style.display='none';}
function fitGraph(){svg.transition().duration(750).call(d3.zoom().transform,d3.zoomIdentity);}
function updateStats(){
  const ltCount = (currentData&&currentData.entities&&currentData.entities.learning_tasks||[]).length;
  const ltInfo = ltCount ? ` | L:${ltCount}` : '';
  document.getElementById('stats').innerHTML = `节点:${graphData.nodes.length} | 关系:${graphData.links.length}<br>T:${graphData.nodes.filter(n=>n.type==='task').length} C:${graphData.nodes.filter(n=>n.type==='competency').length} S:${graphData.nodes.filter(n=>n.type==='skill').length}${ltInfo}`;
}

function filterLayer(type){
  document.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));
  [...document.querySelectorAll('.btn')].find(b=>b.textContent.includes(type==='all'?'全部':type==='task'?'任务':type==='competency'?'能力':'技能'))?.classList.add('active');
  const show = type==='all';
  nodeGroup.selectAll('g').style('opacity',d=>show||d.type===type?1:.1);
  labelGroup.selectAll('text').style('opacity',d=>show||d.type===type?1:.08);
}
function copyShareURL(){
  navigator.clipboard.writeText(window.location.href).then(()=>alert('链接已复制！')).catch(()=>prompt('复制此链接:',window.location.href));
}

function showLearningView(){
  document.getElementById('learningView').style.display='block';
  document.getElementById('closeLearning').style.display='block';
  document.querySelector('#toolbar').style.opacity='.3';
  renderLearningCards();
}
function showGraphView(){
  document.getElementById('learningView').style.display='none';
  document.getElementById('closeLearning').style.display='none';
  document.querySelector('#toolbar').style.opacity='1';
}
function renderLearningCards(){
  const grid = document.getElementById('learningGrid');
  const lts = (currentData && currentData.entities && currentData.entities.learning_tasks) || [];
  if(!lts.length){ grid.innerHTML='<p style="text-align:center;color:#888;grid-column:1/-1;padding:40px">暂无学习任务数据，请确认Coze工作流已添加学习任务转化节点</p>'; return; }
  grid.innerHTML = lts.map(lt => {
    const stepsHtml = (lt.steps||[]).map(s => `
      <div class="lt-step">
        <span class="step-num">${s.order}</span>
        <div style="flex:1">
          <strong style="font-size:12px">${s.title||''}</strong>
          <div style="color:#ccc;margin-top:2px">${s.action||''}</div>
          ${s.tips?`<div class="step-tip">💡 ${s.tips}</div>`:''}
        </div>
        <span class="step-dur">${s.duration||''}</span>
      </div>`).join('');

    const tagsHtml = [
      ...(lt.knowledge_points||[]).map(k=>`<span>📚 ${k}</span>`),
      ...(lt.skill_points||[]).map(k=>`<span>🔧 ${k}</span>`)
    ].join('');

    const resourcesHtml = (lt.resources||[]).map(r=>{
      const icons={微课视频:'🎬',实训手册:'📖',仿真软件:'💻',课件PPT:'📊',实训指导书:'📘'};
      return `<div class="lt-resource"><span class="res-icon">${icons[r.type]||'📎'}</span>${r.name}${r.note?` <span style="color:#888">— ${r.note}</span>`:''}</div>`;
    }).join('');

    const safetyHtml = (lt.safety_points||[]).map(s=>`⚠️ ${s}`).join('<br>');

    return `
    <div class="lt-card">
      <span class="lt-badge" style="background:rgba(255,167,38,.15);color:#ffa726">🎯 学习任务</span>
      <h3>${lt.name||''}</h3>
      <div class="lt-ref">关联工作任务: ${lt.work_task_ref||''}</div>
      <div class="lt-scenario">${lt.scenario||''}</div>
      ${lt.objectives&&lt.objectives.length?`<h4>🎯 学习目标</h4><ul style="font-size:12px;color:#ccc;padding-left:18px;margin:4px 0">${lt.objectives.map(o=>`<li>${o}</li>`).join('')}</ul>`:''}
      <h4>📝 任务步骤 (总时长约${lt.steps&&lt.steps.length?lt.steps.reduce((a,b)=>a+(parseInt(b.duration)||15),0):0}分钟)</h4>
      ${stepsHtml}
      ${tagsHtml?`<h4>🏷️ 关联知识点/技能点</h4><div class="lt-tags">${tagsHtml}</div>`:''}
      ${safetyHtml?`<h4>🛡️ 安全要点</h4><div class="lt-safety">${safetyHtml}</div>`:''}
      ${resourcesHtml?`<h4>📦 推荐实训资源</h4>${resourcesHtml}`:''}
      ${lt.assessment?`<h4>✅ 考核标准</h4><div class="lt-assessment"><div style="margin-bottom:2px">方式: ${lt.assessment.method||''}</div><div>标准: ${(lt.assessment.criteria||[]).join(' | ')}</div><div style="margin-top:2px">合格线: ${lt.assessment.pass_line||''}</div></div>`:''}
    </div>`;
  }).join('');
}

document.getElementById('searchInput').addEventListener('input',function(){
  const q=this.value.trim().toLowerCase();
  if(!q){nodeGroup.selectAll('g').style('opacity',1);labelGroup.selectAll('text').style('opacity',1);return;}
  nodeGroup.selectAll('g').each(function(d){d3.select(this).style('opacity',d.label.toLowerCase().includes(q)||d.id.toLowerCase().includes(q)?1:.08);});
  labelGroup.selectAll('text').each(function(d){d3.select(this).style('opacity',d.label.toLowerCase().includes(q)||d.id.toLowerCase().includes(q)?1:.05);});
});

window.addEventListener('resize',()=>{
  const w=document.getElementById('container').clientWidth,h=document.getElementById('container').clientHeight;
  svg.attr('width',w).attr('height',h);
  simulation?.force('center',d3.forceCenter(w/2,h/2));
  simulation?.alpha(.3).restart();
});

// 拖拽上传
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>{
  e.preventDefault();
  const file=e.dataTransfer.files[0];
  if(file&&file.name.endsWith('.json')){
    const reader=new FileReader();
    reader.onload=ev=>{
      try{const d=JSON.parse(ev.target.result);currentData=d;graphData=buildGraph(d);renderGraph();}
      catch(err){alert('JSON解析失败:'+err.message);}
    };
    reader.readAsText(file);
  }
});
