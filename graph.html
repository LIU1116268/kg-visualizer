<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI数据标注师 — 岗位能力知识图谱 (泳道图)</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
:root {
  --bg: #070b1d;
  --surface: #0f172a;
  --text: #e2e8f0;
  --muted: #94a3b8;
  --border: rgba(148,163,184,0.18);
  --lane-bg: rgba(15,23,42,0.5);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
  background: radial-gradient(ellipse at 30% 20%, rgba(30,58,138,0.25), #070b1d 65%);
  color: var(--text);
  overflow: hidden;
  height: 100vh;
  user-select: none;
}

#app {
  height: 100vh;
  display: grid;
  grid-template-rows: auto 1fr;
}

/* ── Header ── */
.header {
  padding: 14px 22px;
  border-bottom: 1px solid var(--border);
  background: rgba(7,11,29,0.88);
  backdrop-filter: blur(18px);
  z-index: 10;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
}
.header h1 {
  font-size: 20px; font-weight: 700;
  background: linear-gradient(135deg, #38bdf8, #c4b5fd);
  -webkit-background-clip: text; background-clip: text; color: transparent;
  white-space: nowrap;
}
.toolbar {
  margin-left: auto;
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.btn {
  height: 32px; padding: 0 13px;
  border: 1px solid var(--border); border-radius: 8px;
  background: rgba(15,23,42,0.7); color: #cbd5e1;
  cursor: pointer; font-size: 12.5px; transition: all 0.2s;
  white-space: nowrap;
}
.btn:hover { border-color: #38bdf8; background: rgba(30,41,59,0.85); box-shadow: 0 0 12px rgba(56,189,248,0.15); }
.btn.active { background: #1e3a5f; border-color: #38bdf8; color: #fff; }
#searchInput {
  height: 32px; padding: 0 12px; width: 180px;
  border: 1px solid var(--border); border-radius: 8px;
  background: rgba(15,23,42,0.7); color: #e2e8f0;
  font-size: 12.5px; outline: none;
}
#searchInput::placeholder { color: #64748b; }
#searchInput:focus { border-color: #38bdf8; }

/* ── Main Canvas ── */
.main {
  position: relative;
  overflow: hidden;
}
#canvas-container {
  width: 100%; height: 100%;
  cursor: grab;
}
#canvas-container:active { cursor: grabbing; }
#canvas-container.panning { cursor: grabbing; }

/* ── Lane labels (SVG text styled via CSS is limited, so we style via JS) ── */

/* ── Stats bar ── */
#stats {
  position: absolute; left: 20px; bottom: 18px;
  display: flex; gap: 16px; flex-wrap: wrap;
  z-index: 5; pointer-events: none;
}
.stat-item {
  font-size: 11.5px; padding: 5px 12px;
  border-radius: 20px;
  background: rgba(15,23,42,0.82);
  border: 1px solid var(--border);
  backdrop-filter: blur(12px);
  display: flex; align-items: center; gap: 6px;
}
.stat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* ── Detail panel ── */
#detail {
  position: absolute; top: 16px; right: 16px;
  width: min(370px, calc(100vw - 32px));
  max-height: calc(100vh - 140px);
  overflow-y: auto;
  padding: 20px;
  background: linear-gradient(180deg, rgba(15,23,42,0.97), rgba(9,13,30,0.97));
  border: 1px solid var(--border); border-radius: 16px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.55);
  backdrop-filter: blur(18px);
  display: none; z-index: 10;
}
#detail.show { display: block; }
#detail h3 { font-size: 17px; margin-bottom: 6px; margin-right: 28px; }
#detail .type-chip {
  display: inline-flex; align-items: center; gap: 5px;
  border-radius: 20px; padding: 3px 11px; font-size: 11px; margin-bottom: 12px;
}
#detail p { font-size: 13px; color: #cbd5e1; line-height: 1.65; margin: 6px 0; }
#detail b { color: #f1f5f9; }
.close-btn {
  position: absolute; top: 12px; right: 14px;
  border: 0; background: transparent; color: #94a3b8;
  font-size: 22px; cursor: pointer; line-height: 1;
}
.close-btn:hover { color: #e2e8f0; }

/* ── Tooltip ── */
#tooltip {
  position: absolute; pointer-events: none; opacity: 0;
  background: rgba(15,23,42,0.95); border: 1px solid rgba(255,255,255,0.18);
  border-radius: 8px; padding: 7px 13px; font-size: 12.5px;
  z-index: 20; white-space: nowrap; transition: opacity 0.12s;
}
#loading {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  z-index: 50; font-size: 15px; color: #38bdf8; pointer-events: none;
}
</style>
</head>

<div id="app">

      <button class="btn" data-filter="skill">技能点</button>
      <button class="btn" onclick="resetView()">🔍 重置视图</button>
      <button class="btn" onclick="exportPNG()">📥 导出PNG</button>

  </header>

  <main class="main">
    <div id="canvas-container"></div>
    <div id="stats"></div>
    <div id="detail">
      <button class="close-btn" onclick="closeDetail()">✕</button>
      <div id="detailContent"></div>

    <div id="tooltip"></div>

</div>

  { id: 'lane_skill',    types: ['skill'],                           widthRatio: 0.33, fixedLabel: '技能点' },
];

function getLanes(nodes) {
  return LANE_DEFS.map(def => {
    const count = nodes.filter(n => def.types.includes(n.type)).length;
    return { ...def, label: `${def.fixedLabel} (${count})`, count };
  });
}

function canon(s) { return String(s ?? '').replace(/\s+/g, '').trim(); }

function buildGraph(data) {
  const nodes = [], nodeMap = new Map();
  const e = data.entities || {};

  function addNode(id, label, type, entity) {
    id = canon(id);
    if (!id || nodeMap.has(id)) return;
    const node = { id, label: (label || id).replace(/\s+/g, ' ').trim(), type, entity: entity || {} };
    nodes.push(node);
    nodeMap.set(id, node);
  }

  // 添加各层实体
  if (e.industry_chain?.name) addNode(e.industry_chain.name, e.industry_chain.name, 'industry_chain', e.industry_chain);
  if (e.job_group?.name) addNode(e.job_group.name, e.job_group.name, 'job_group', e.job_group);
  if (e.job?.name) addNode(e.job.name, e.job.name, 'job', e.job);
  (e.tasks || []).forEach(t => addNode(t.id, t.name, 'task', t));
  (e.competencies || []).forEach(c => addNode(c.id, c.name, 'competency', c));
  (e.skills || []).forEach(s => addNode(s.id, s.name, 'skill', s));

  // 构建边的别名映射
  const alias = new Map();
  const jobName = data.meta?.job_title || e.job?.name || '';
  [e.industry_chain?.name, e.job_group?.name, jobName, data.meta?.job_title].forEach(v => {
    if (v) alias.set(canon(v), canon(jobName));
  });

  const links = [], seen = new Set();
  (data.edges || []).forEach(edge => {
    let s = alias.get(canon(edge.source)) || canon(edge.source);
    let t = alias.get(canon(edge.target)) || canon(edge.target);
    if (nodeMap.has(s) && nodeMap.has(t) && s !== t) {
      const k = s + '::' + t;
      if (!seen.has(k)) {
        seen.add(k);
        links.push({
          source: s, target: t,
          relation: edge.relation || '',
          label: edge.label || ''
        });
      }
    }
  });

  return { nodes, links, nodeMap };
}

// ═══════════════════════════════════════════
// 泳道布局计算
// ═══════════════════════════════════════════
const NODE_W = { industry_chain: 150, job_group: 150, job: 150, task: 170, competency: 175, skill: 185 };
const NODE_H = 34;
const LANE_PAD_TOP = 60;   // 泳道顶部留白(给标题)
const LANE_PAD_BOT = 24;
const V_GAP = 10;          // 节点间垂直间距

function computeLayout(nodes, svgW, svgH, lanes) {
  // 分组节点到泳道
  const laneNodes = lanes.map(() => []);
  const nodePos = new Map();

  nodes.forEach(n => {
    for (let i = 0; i < lanes.length; i++) {
      if (lanes[i].types.includes(n.type)) {
        laneNodes[i].push(n);
        return;
      }
    }
  });

  // 计算泳道 X 边界
  let xCursor = 0;
  const laneX = lanes.map((lane) => {
    const w = lane.widthRatio * svgW;
    const cx = xCursor + w / 2;
    xCursor += w;
    return { left: xCursor - w, center: cx, width: w };
  });

  // 计算每个泳道内节点的 Y 位置 (lane 0 特殊处理: 节点聚拢居中)
  const usableH = svgH - LANE_PAD_TOP - LANE_PAD_BOT;
  laneNodes.forEach((lnodes, li) => {
    const count = lnodes.length;
    const gap = li === 0 ? Math.min(V_GAP + 6, (usableH - count * NODE_H) / Math.max(count - 1, 1)) : V_GAP;
    const totalH = count * NODE_H + (count - 1) * gap;
    const startY = LANE_PAD_TOP + (usableH - totalH) / 2;

    lnodes.forEach((n, ni) => {
      const nodeW = NODE_W[n.type] || 160;
      nodePos.set(n.id, {
        x: laneX[li].center - nodeW / 2,
        y: startY + ni * (NODE_H + gap),
        w: nodeW,
        h: NODE_H,
        laneIdx: li,
        laneCenter: laneX[li].center,
        laneLeft: laneX[li].left,
        laneWidth: laneX[li].width
      });
    });
  });

  return { nodePos, laneX };
}

// ═══════════════════════════════════════════
// SVG 渲染
// ═══════════════════════════════════════════
function initSVG() {
  const container = document.getElementById('canvas-container');
  container.innerHTML = '';
  svg = d3.select('#canvas-container').append('svg')
    .attr('width', '100%').attr('height', '100%');

  // 渐变 & 滤镜定义
  const defs = svg.append('defs');

  // 发光滤镜
  Object.entries(COLORS).forEach(([key, color]) => {
    defs.append('filter').attr('id', `glow-${key}`)
      .attr('x', '-20%').attr('y', '-20%').attr('width', '140%').attr('height', '140%')
      .append('feDropShadow').attr('dx', 0).attr('dy', 0)
      .attr('stdDeviation', 4).attr('flood-color', color).attr('flood-opacity', 0.45);
  });

  // 泳道背景渐变 (预生成4条泳道)
  for (let i = 0; i < 4; i++) {
    defs.append('linearGradient').attr('id', `lane-grad-${i}`)
      .attr('x1', '0').attr('y1', '0').attr('x2', '0').attr('y2', '1')
      .selectAll('stop')
      .data([{ offset: '0%', color: 'rgba(20,30,55,0.35)' }, { offset: '100%', color: 'rgba(10,16,32,0.15)' }])
      .join('stop').attr('offset', d => d.offset).attr('stop-color', d => d.color);
  }

  // 边的渐变 (使用 source type 颜色)
  Object.entries(COLORS).forEach(([key, color]) => {
    defs.append('linearGradient').attr('id', `edge-grad-${key}`)
      .attr('gradientUnits', 'userSpaceOnUse')
      .attr('x1', '0').attr('y1', '0').attr('x2', '1').attr('y2', '0')
      .selectAll('stop')
      .data([{ offset: '0%', color, opacity: 0.6 }, { offset: '100%', color, opacity: 0.15 }])
      .join('stop').attr('offset', d => d.offset).attr('stop-color', d => d.color).attr('stop-opacity', d => d.opacity);
  });

  gMain = svg.append('g').attr('class', 'main-group');

  zoomBehavior = d3.zoom()
    .scaleExtent([0.25, 2.5])
    .on('zoom', (event) => { gMain.attr('transform', event.transform); });
  svg.call(zoomBehavior);
}

function renderAll() {
  const container = document.getElementById('canvas-container');
  const svgW = container.clientWidth;
  const svgH = container.clientHeight;
  svg.attr('width', svgW).attr('height', svgH);

  // 过滤节点
  let visibleNodes = allNodes;
  if (currentFilter !== 'all') {
    const filterSet = new Set(['industry_chain', 'job_group', 'job', currentFilter]);
    visibleNodes = allNodes.filter(n => filterSet.has(n.type));
  }
  const visibleIds = new Set(visibleNodes.map(n => n.id));

  // 只保留两端都可见的边
  let visibleLinks = allLinks.filter(l => visibleIds.has(l.source) && visibleIds.has(l.target));

  // 动态生成泳道(含实际节点计数)
  const lanes = getLanes(visibleNodes);

  // 计算布局
  const { nodePos, laneX } = computeLayout(visibleNodes, svgW, svgH, lanes);

  gMain.selectAll('*').remove();

  // ── 渲染泳道背景 ──
  const laneGroup = gMain.append('g').attr('class', 'lanes');
  laneX.forEach((lx, i) => {
    const lane = lanes[i];
    const typeForColor = lane.types[lane.types.length - 1];
    // 背景矩形
    laneGroup.append('rect')
      .attr('x', lx.left + 4).attr('y', 0)
      .attr('width', lx.width - 8).attr('height', svgH)
      .attr('fill', `url(#lane-grad-${i})`)
      .attr('rx', 10).attr('ry', 10)
      .attr('stroke', COLORS[typeForColor] || 'rgba(148,163,184,0.12)')
      .attr('stroke-width', 1).attr('stroke-opacity', 0.25);

    // 泳道标题
    laneGroup.append('text')
      .attr('x', lx.center).attr('y', 26)
      .attr('text-anchor', 'middle')
      .attr('fill', '#94a3b8').attr('font-size', '12.5px')
      .attr('font-weight', '600').attr('letter-spacing', '1px')
      .text(lane.label);

    // 标题下方装饰线
    laneGroup.append('line')
      .attr('x1', lx.center - 20).attr('y1', 34)
      .attr('x2', lx.center + 20).attr('y2', 34)
      .attr('stroke', COLORS[typeForColor] || '#475569')
      .attr('stroke-width', 2).attr('stroke-linecap', 'round')
      .attr('opacity', 0.45);
  });

  // ── 渲染边 (贝塞尔曲线，跨泳道横向连接) ──
  const edgeGroup = gMain.append('g').attr('class', 'edges');
  const edgeData = visibleLinks.map(l => {
    const sp = nodePos.get(l.source);
    const tp = nodePos.get(l.target);
    if (!sp || !tp) return null;
    const srcNode = allNodes.find(n => n.id === l.source);
    const srcType = srcNode?.type || 'task';
    const sameLane = sp.laneIdx === tp.laneIdx;
    return {
      ...l,
      x1: sp.x + sp.w,  y1: sp.y + sp.h / 2,
      x2: tp.x,         y2: tp.y + tp.h / 2,
      srcType, sameLane,
      sy: sp.y, sh: sp.h, ty: tp.y, th: tp.h
    };
  }).filter(Boolean);

  edgeData.forEach(edge => {
    const path = d3.path();
    path.moveTo(edge.x1, edge.y1);

    if (edge.sameLane) {
      // 同泳道: 右侧弧形弯出再弯入
      const dx = Math.abs(edge.x2 - edge.x1);
      const dy = edge.y2 - edge.y1;
      const cx1 = edge.x1 + dx * 0.5;
      const cy1 = edge.y1;
      const cx2 = edge.x2 - dx * 0.5;
      const cy2 = edge.y2;
      path.bezierCurveTo(cx1, cy1, cx2, cy2, edge.x2, edge.y2);
    } else {
      // 跨泳道: 平滑S曲线
      const midX = (edge.x1 + edge.x2) / 2;
      path.bezierCurveTo(midX, edge.y1, midX, edge.y2, edge.x2, edge.y2);
    }

    edgeGroup.append('path')
      .attr('d', path.toString())
      .attr('fill', 'none')
      .attr('stroke', COLORS[edge.srcType] || '#475569')
      .attr('stroke-width', 1)
      .attr('stroke-opacity', 0.22)
      .attr('data-source', edge.source)
      .attr('data-target', edge.target)
      .attr('class', 'edge-path');
  });

  // ── 渲染节点 ──
  const nodeGroup = gMain.append('g').attr('class', 'nodes');
  visibleNodes.forEach(n => {
    const pos = nodePos.get(n.id);
    if (!pos) return;
    const color = COLORS[n.type] || '#888';

    const g = nodeGroup.append('g')
      .attr('class', 'node')
      .attr('transform', `translate(${pos.x},${pos.y})`)
      .attr('data-id', n.id)
      .attr('data-type', n.type)
      .style('cursor', 'pointer');

    // 节点背景
    g.append('rect')
      .attr('class', 'node-rect')
      .attr('width', pos.w).attr('height', pos.h)
      .attr('rx', 7).attr('ry', 7)
      .attr('fill', '#0f172a')
      .attr('stroke', color)
      .attr('stroke-width', 1.3)
      .attr('stroke-opacity', 0.55)
      .style('filter', `url(#glow-${n.type})`)
      .style('transition', 'all 0.2s');

    // 左侧色条
    g.append('rect')
      .attr('x', 0).attr('y', 0)
      .attr('width', 4).attr('height', pos.h)
      .attr('rx', 2).attr('ry', 2)
      .attr('fill', color)
      .attr('opacity', 0.85);

    // 标签: ID 前缀
    const showId = (n.type === 'task' || n.type === 'competency' || n.type === 'skill');
    const displayLabel = showId
      ? (n.label.length > 11 ? n.label.slice(0, 10) + '…' : n.label)
      : n.label.length > 11 ? n.label.slice(0, 10) + '…' : n.label;

    g.append('text')
      .attr('class', 'node-label')
      .attr('x', 12).attr('y', pos.h / 2 + 1)
      .attr('dominant-baseline', 'central')
      .attr('fill', '#e2e8f0')
      .attr('font-size', n.type === 'skill' ? '11px' : '12px')
      .attr('font-weight', '500')
      .text(displayLabel);

    // ID 小标签 (右上角)
    if (showId) {
      g.append('text')
        .attr('class', 'node-id-tag')
        .attr('x', pos.w - 8).attr('y', pos.h / 2 + 1)
        .attr('dominant-baseline', 'central')
        .attr('text-anchor', 'end')
        .attr('fill', '#64748b')
        .attr('font-size', '9px')
        .text(n.id);
    }

    // 等级徽章 (如果有 level 字段)
    const level = n.entity?.level || n.entity?.difficulty;
    if (level) {
      const levelColors = { '初级': '#22c55e', '中级': '#f59e0b', '高级': '#ef4444', '基础': '#22c55e', '进阶': '#f59e0b' };
      const lc = levelColors[level] || '#64748b';
      g.append('circle')
        .attr('cx', pos.w - 7).attr('cy', 10)
        .attr('r', 4).attr('fill', lc).attr('opacity', 0.7);
    }

    // 交互事件
    g.on('click', (event) => {
      if (event.target.closest('.node-rect') || event.target.closest('.node-label') || event.target.closest('.node-id-tag')) {
        showDetail(n);
      }
    });
    g.on('mouseenter', (event) => {
      highlightConnections(n.id, true);
      const tt = document.getElementById('tooltip');
      const extra = n.entity?.category ? ` · ${n.entity.category}` : '';
      const lvl = level ? ` [${level}]` : '';
      tt.innerHTML = `<strong style="color:${color}">${n.label}</strong><span style="color:#888;font-size:11px">${extra}${lvl}</span>`;
      tt.style.opacity = 1;
      tt.style.left = (event.pageX + 14) + 'px';
      tt.style.top = (event.pageY - 14) + 'px';
    });
    g.on('mouseleave', () => {
      highlightConnections(null, false);
      document.getElementById('tooltip').style.opacity = 0;
    });
    g.on('mousemove', (event) => {
      const tt = document.getElementById('tooltip');
      tt.style.left = (event.pageX + 14) + 'px';
      tt.style.top = (event.pageY - 14) + 'px';
    });
  });

  // 更新统计
  updateStats(visibleNodes, visibleLinks);
}

// ═══════════════════════════════════════════
// 高亮关联路径
// ═══════════════════════════════════════════
function highlightConnections(nodeId, on) {
  if (on && nodeId) {
    // 找到所有关联节点
    const connected = new Set();
    connected.add(nodeId);
    // BFS 2跳
    const queue = [nodeId];
    for (let i = 0; i < queue.length && i < 100; i++) {
      const cur = queue[i];
      allLinks.forEach(l => {
        if (l.source === cur && !connected.has(l.target)) { connected.add(l.target); queue.push(l.target); }
        if (l.target === cur && !connected.has(l.source)) { connected.add(l.source); queue.push(l.source); }
      });
    }
    highlightedIds = connected;

    // 淡化非关联节点
    gMain.selectAll('.node').each(function() {
      const id = d3.select(this).attr('data-id');
      d3.select(this).style('opacity', connected.has(id) ? 1 : 0.2);
    });
    // 高亮关联边
    gMain.selectAll('.edge-path').each(function() {
      const src = d3.select(this).attr('data-source');
      const tgt = d3.select(this).attr('data-target');
      const isHL = connected.has(src) || connected.has(tgt);
      d3.select(this)
        .attr('stroke-opacity', isHL ? 0.7 : 0.05)
        .attr('stroke-width', isHL ? 2 : 0.8);
    });
  } else {
    highlightedIds = new Set();
    gMain.selectAll('.node').style('opacity', 1);
    gMain.selectAll('.edge-path')
      .attr('stroke-opacity', 0.22)
      .attr('stroke-width', 1);
  }
}

// ═══════════════════════════════════════════
// 详情面板
// ═══════════════════════════════════════════
function showDetail(n) {
  const e = n.entity || {};
  const color = COLORS[n.type];
  let extra = '';
  if (e.category) extra += `<p><b>📂 分类:</b> ${e.category}</p>`;
  if (e.data_type) extra += `<p><b>📊 数据类型:</b> ${e.data_type}</p>`;
  if (e.level) extra += `<p><b>📈 等级:</b> ${e.level}</p>`;
  if (e.type && n.type === 'competency') extra += `<p><b>🏷️ 能力类型:</b> ${e.type}</p>`;
  if (e.type && n.type === 'skill') extra += `<p><b>🏷️ 技能类型:</b> ${e.type}</p>`;
  if (e.tool_related && e.tool_related !== 'None') extra += `<p><b>🔧 工具:</b> ${e.tool_related}</p>`;
  if (e.difficulty) extra += `<p><b>📐 难度:</b> ${e.difficulty}</p>`;
  if (e.related_positions?.length) extra += `<p><b>👥 相关岗位:</b> ${e.related_positions.join(', ')}</p>`;
  if (e.related_task_ids?.length) extra += `<p><b>🔗 关联任务:</b> ${e.related_task_ids.join(', ')}</p>`;
  if (e.related_competency_ids?.length) extra += `<p><b>🔗 关联能力:</b> ${e.related_competency_ids.join(', ')}</p>`;
  if (e.career_level) extra += `<p><b>📊 职业等级:</b> ${e.career_level}</p>`;

  document.getElementById('detailContent').innerHTML = `
    <h3 style="color:${color}">${n.label}</h3>
    <div class="type-chip" style="background:${color}22;color:${color}">
      <span style="width:7px;height:7px;border-radius:50%;background:${color};display:inline-block;"></span>
      ${TYPE_LABEL[n.type] || n.type}
    </div>
    <p><b>📝 描述:</b> ${e.description || e.summary || '暂无详细描述。'}</p>
    ${extra}
  `;
  document.getElementById('detail').classList.add('show');
}

function closeDetail() {
  document.getElementById('detail').classList.remove('show');
}

function updateStats(nodes, links) {
  const count = t => nodes.filter(n => n.type === t).length;
  document.getElementById('stats').innerHTML = `
    <div class="stat-item"><span class="stat-dot" style="background:#ec4899"></span>岗位层级 ${count('industry_chain')+count('job_group')+count('job')}</div>
    <div class="stat-item"><span class="stat-dot" style="background:#f59e0b"></span>任务 ${count('task')}</div>
    <div class="stat-item"><span class="stat-dot" style="background:#38bdf8"></span>能力 ${count('competency')}</div>
    <div class="stat-item"><span class="stat-dot" style="background:#22c55e"></span>技能 ${count('skill')}</div>
    <div class="stat-item" style="color:#64748b">关系 ${links.length}</div>
  `;
}

// ═══════════════════════════════════════════
// 搜索 & 过滤
// ═══════════════════════════════════════════
document.getElementById('searchInput').addEventListener('input', function() {
  const query = this.value.trim().toLowerCase();
  if (!query) {
    gMain.selectAll('.node').style('opacity', 1);
    gMain.selectAll('.edge-path').attr('stroke-opacity', 0.22).attr('stroke-width', 1);
    return;
  }
  const matched = new Set();
  allNodes.forEach(n => {
    if (n.label.toLowerCase().includes(query) || n.id.toLowerCase().includes(query)) {
      matched.add(n.id);
    }
  });
  // 扩展: 也高亮关联节点
  const expanded = new Set(matched);
  allLinks.forEach(l => {
    if (matched.has(l.source)) expanded.add(l.target);
    if (matched.has(l.target)) expanded.add(l.source);
  });

  gMain.selectAll('.node').each(function() {
    const id = d3.select(this).attr('data-id');
    d3.select(this).style('opacity', expanded.has(id) ? 1 : 0.15);
  });
  gMain.selectAll('.edge-path').each(function() {
    const src = d3.select(this).attr('data-source');
    const tgt = d3.select(this).attr('data-target');
    const hl = expanded.has(src) || expanded.has(tgt);
    d3.select(this).attr('stroke-opacity', hl ? 0.6 : 0.04).attr('stroke-width', hl ? 1.8 : 0.6);
  });
});

document.querySelectorAll('.btn[data-filter]').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.btn[data-filter]').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    currentFilter = this.dataset.filter;
    renderAll();
  });
});

function resetView() {
  svg.transition().duration(500).call(zoomBehavior.transform, d3.zoomIdentity);
}

function exportPNG() {
  const serializer = new XMLSerializer();
  const svgStr = serializer.serializeToString(svg.node());
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  const img = new Image();
  const blob = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  img.onload = () => {
    canvas.width = svg.node().clientWidth * 2;
    canvas.height = svg.node().clientHeight * 2;
    ctx.fillStyle = '#070b1d';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    URL.revokeObjectURL(url);
    const a = document.createElement('a');
    a.download = '知识图谱_泳道图.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  };
  img.src = url;
}

document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (!file || !file.name.endsWith('.json')) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      loadData(data);
    } catch (err) {
      alert('JSON 解析失败: ' + err.message);
    }
  };
  reader.readAsText(file);
});

// ═══════════════════════════════════════════
// URL 解压加载 (兼容旧版)
// ═══════════════════════════════════════════
async function decompressFromURL() {
  const hash = window.location.hash.replace('#', '');
  const params = new URLSearchParams(hash);
  const d = params.get('d');
  if (!d) return null;
  try {
    let b64 = d.replace(/-/g, '+').replace(/_/g, '/');
    while (b64.length % 4) b64 += '=';
    const binary = atob(b64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const ds = new DecompressionStream('deflate');
    const writer = ds.writable.getWriter();
    const reader = ds.readable.getReader();
    writer.write(bytes); writer.close();
    const chunks = []; let done = false;
    while (!done) { const { value, done: dd } = await reader.read(); if (dd) done = true; if (value) chunks.push(value); }
    const totalLength = chunks.reduce((a, b) => a + b.length, 0);
    const result = new Uint8Array(totalLength); let offset = 0;
    for (const chunk of chunks) { result.set(chunk, offset); offset += chunk.length; }
    return JSON.parse(new TextDecoder().decode(result));
  } catch (e) { console.error(e); return null; }
}

function loadData(data) {
  const g = buildGraph(data);
  allNodes = g.nodes;
  allLinks = g.links;
  renderAll();
  document.getElementById('loading').style.display = 'none';
}

// ═══════════════════════════════════════════
// 窗口自适应 (debounced)
// ═══════════════════════════════════════════
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (allNodes.length > 0) renderAll();
  }, 200);
});

// ═══════════════════════════════════════════
// 启动
// ═══════════════════════════════════════════
(async function init() {
  initSVG();

  const urlData = await decompressFromURL();
  if (urlData) {
    loadData(urlData);
  } else {
    // 使用内嵌数据
    loadData(EMBEDDED_DATA);
  }

  // 初始缩放: 稍微缩小让全部泳道可见
  setTimeout(() => {
    const container = document.getElementById('canvas-container');
    svg.call(zoomBehavior.transform, d3.zoomIdentity.translate(20, 0).scale(0.82));
  }, 300);
})();
</script>
