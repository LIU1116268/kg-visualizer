<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI数据标注师 · 岗位能力知识图谱</title>
<style>
:root {
  --bg:#070b1d; --panel:#10172f; --panel2:#0d1328; --text:#eaf1ff; --muted:#94a3b8;
  --line:#26314f; --task:#f59e0b; --comp:#38bdf8; --skill:#22c55e; --root:#fb7185;
  --glow:#60a5fa; --border:rgba(148,163,184,.22);
}
* { box-sizing:border-box } html,body { height:100%; margin:0 }
body {
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif;
  background:
    radial-gradient(circle at 18% 8%, rgba(59,130,246,.20), transparent 30%),
    radial-gradient(circle at 80% 15%, rgba(168,85,247,.16), transparent 34%),
    linear-gradient(180deg, #070b1d 0%, #060817 100%);
  color:var(--text); overflow:hidden;
}
#app { height:100%; display:grid; grid-template-rows:auto 1fr; }

/* ── Header ── */
.header {
  padding:16px 22px 14px; border-bottom:1px solid var(--border);
  background:rgba(7,11,29,.78); backdrop-filter:blur(18px);
  box-shadow:0 18px 50px rgba(0,0,0,.22); z-index:5;
}
.topline { display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
.logo {
  width:34px; height:34px; border-radius:12px;
  background:linear-gradient(135deg,#60a5fa,#a78bfa);
  box-shadow:0 0 28px rgba(96,165,250,.45);
  display:grid; place-items:center; font-weight:900; color:#061225; font-size:14px;
}
h1 {
  margin:0; font-size:22px; letter-spacing:.5px;
  background:linear-gradient(135deg,#e0f2fe,#c4b5fd);
  -webkit-background-clip:text; background-clip:text; color:transparent;
}
.subtitle { margin:6px 0 0 48px; color:var(--muted); font-size:13px; line-height:1.45; }
.toolbar { margin-left:auto; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.input {
  width:220px; height:34px; padding:0 12px;
  border:1px solid var(--border); border-radius:10px;
  background:rgba(15,23,42,.72); color:var(--text); outline:none;
}
.input:focus { border-color:rgba(96,165,250,.72); box-shadow:0 0 0 3px rgba(96,165,250,.14); }
.btn {
  height:34px; padding:0 12px; border:1px solid var(--border); border-radius:10px;
  background:rgba(15,23,42,.72); color:#dbeafe; cursor:pointer; transition:.18s; font-size:13px;
}
.btn:hover { transform:translateY(-1px); border-color:rgba(96,165,250,.6); background:rgba(30,41,59,.88); }
.btn.active {
  background:linear-gradient(135deg,#2563eb,#7c3aed); border-color:transparent;
  color:white; box-shadow:0 10px 24px rgba(37,99,235,.22);
}

/* ── Canvas ── */
.main { position:relative; overflow:hidden; min-height:0; }
.canvas-wrap {
  position:absolute; inset:0; overflow:hidden; cursor: grab;
  user-select: none; -webkit-user-select: none;
}
.canvas-wrap:active { cursor: grabbing; }

svg { display:block; width:100%; height:100%; }

/* ── SVG Elements ── */
.edge { fill:none; stroke:rgba(148,163,184,.28); stroke-width:1.4; }
.edge.dim { opacity:.08; }
.node { cursor:pointer; transition:opacity .2s; }
.node-card { 
  rx:16; ry:16; 
  fill:rgba(15,23,42,.86); 
  stroke:rgba(148,163,184,.24); 
  stroke-width:1; 
  filter: drop-shadow(0 6px 16px rgba(0,0,0,.28));
}
.node:hover .node-card { stroke:rgba(96,165,250,.78); filter:url(#softGlow); }

/* 强制文本进行精确几何抗锯齿渲染 */
.node-title, .node-meta, .column-title {
  text-rendering: geometricPrecision;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
.node-title { font-size:13px; font-weight:700; fill:#edf5ff; pointer-events:none; letter-spacing: normal !important; }
.node-meta { font-size:10px; fill:#8ea3bd; pointer-events:none; letter-spacing: normal !important; }
.node-dot { stroke:rgba(255,255,255,.42); stroke-width:1; }
.node.dim { opacity:.12; }
.node.highlight .node-card { stroke:#facc15; stroke-width:2; filter:url(#yellowGlow); }
.column-title { font-size:13px; fill:#cbd5e1; font-weight:800; letter-spacing:.8px; }
.column-line { stroke:rgba(148,163,184,.10); stroke-width:1; }

/* ── Overlays ── */
.stats {
  position:absolute; left:24px; bottom:22px;
  background:rgba(15,23,42,.74); border:1px solid var(--border); border-radius:16px;
  padding:12px 14px; display:grid; gap:7px;
  box-shadow:0 20px 48px rgba(0,0,0,.28); backdrop-filter:blur(16px); font-size:12px; pointer-events:none;
}
.stat-row { display:flex; align-items:center; gap:8px; color:#cbd5e1; }
.legend-dot { width:10px; height:10px; border-radius:999px; flex-shrink:0; }
.pill {
  position:absolute; right:24px; bottom:22px;
  background:rgba(15,23,42,.74); border:1px solid var(--border); border-radius:16px;
  padding:12px 14px; color:#9fb2cc; font-size:12px; line-height:1.6;
  backdrop-filter:blur(16px); text-align:right; pointer-events:none;
}
.detail {
  position:absolute; top:24px; right:24px;
  width:min(380px,calc(100vw - 48px)); max-height:calc(100vh - 160px); overflow:auto;
  padding:18px;
  background:linear-gradient(180deg,rgba(15,23,42,.94),rgba(9,13,30,.94));
  border:1px solid var(--border); border-radius:18px;
  box-shadow:0 24px 70px rgba(0,0,0,.38); backdrop-filter:blur(18px);
  display:none; z-index:10;
}
.detail.show { display:block; }
.detail h2 { font-size:18px; margin:0 30px 8px 0; }
.detail .tag {
  display:inline-flex; align-items:center; gap:6px;
  border-radius:999px; padding:4px 10px; font-size:12px; margin-bottom:12px;
}
.detail p { font-size:13px; color:#cbd5e1; line-height:1.62; margin:8px 0; }
.detail b { color:#f8fafc; }
.close-btn {
  position:absolute; top:12px; right:14px; border:0;
  background:transparent; color:#94a3b8; font-size:20px; cursor:pointer;
}
.toast {
  position:absolute; top:86px; left:50%; transform:translateX(-50%);
  background:rgba(15,23,42,.92); border:1px solid var(--border); border-radius:999px;
  padding:9px 16px; color:#e2e8f0; font-size:13px;
  box-shadow:0 18px 44px rgba(0,0,0,.26); opacity:0; pointer-events:none; transition:.25s; z-index:20;
}
.toast.show { opacity:1; top:96px; }
.empty-state {
  position:absolute; inset:0; display:grid; place-items:center;
  color:#94a3b8; text-align:center; padding:24px; pointer-events:none;
}
.empty-state strong { color:#e2e8f0; }

/* ── Responsive ── */
@media(max-width:900px){
  .subtitle { margin-left:0; } .toolbar { width:100%; margin-left:0; }
  .input { flex:1; width:180px; } .header { padding:14px; }
  .pill { display:none; }
}
</style>
</head>
<body>
<div id="app">
  <header class="header">
    <div class="topline">
      <div class="logo">KG</div>
      <div>
        <h1>岗位能力知识图谱</h1>
        <div class="subtitle" id="subtitle">AI数据标注师 · 任务、能力、技能关系图谱</div>
      </div>
      <div class="toolbar">
        <input class="input" id="searchInput" placeholder="搜索任务 / 能力 / 技能…" />
        <button class="btn active" data-filter="all">全部</button>
        <button class="btn" data-filter="job_specialization">方向</button>
        <button class="btn" data-filter="task">任务</button>
        <button class="btn" data-filter="competency">能力</button>
        <button class="btn" data-filter="skill">技能</button>
        <button class="btn" id="copyBtn">复制链接</button>
        <button class="btn" id="resetBtn">回到中心</button>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="canvas-wrap" id="wrap">
      <svg id="graph">
        <g id="viewport"></g>
      </svg>
    </div>

    <aside class="detail" id="detail">
      <button class="close-btn" id="closeDetail">×</button>
      <div id="detailContent"></div>
    </aside>

    <div class="stats" id="stats"></div>

    <div class="pill" id="sourcePill">拖入 JSON 文件<br/>或通过分享链接打开</div>

    <div class="toast" id="toast">已复制</div>

    <div class="empty-state" id="emptyState">
      <div>
        <div style="font-size:56px;margin-bottom:14px">📊</div>
        <strong>拖入 sample_graph.json</strong><br/>
        <span style="font-size:13px">或通过分享链接打开图谱</span>
      </div>
    </div>
  </main>
</div>

// 2. 常量 & 交互缩放状态管理
// ═══════════════════════════════════════════
const TYPE_INFO = {
  industry_chain:    { label:'产业链',      color:'#fb7185' },
  job_group:         { label:'岗位群',      color:'#fb7185' },
  job:               { label:'目标岗位',    color:'#fb7185' },

  competency:        { label:'能力项',      color:'#38bdf8' },
  skill:             { label:'技能/知识点', color:'#22c55e' }
};
const ORDER = ['industry_chain','job_group','job','job_specialization','task','competency','skill'];

let graph = { nodes:[], links:[], meta:{} };
let layout = { nodes:new Map(), w:1500, h:900 };

// ═══════════════════════════════════════════
// 3. 工具函数
// ═══════════════════════════════════════════
function cleanText(s) { return String(s??'').replace(/([一-鿿])\s+(?=[一-鿿])/g,'$1').replace(/\s+/g,' ').trim(); }
function canon(s) { return String(s??'').replace(/\s+/g,'').trim(); }
function truncate(s, n) { s = cleanText(s); return s.length > n ? s.slice(0, n) + '…' : s; }

// ═══════════════════════════════════════════
// 4. URL 数据解密
// ═══════════════════════════════════════════
async function decodeURLData() {
  const hash = window.location.hash.replace('#','');
  const params = new URLSearchParams(hash || window.location.search);
  const token = params.get('d') || params.get('j');
  if (!token) return null;

  function tokenToBytes(t) {
    let b64 = String(t).replace(/-/g,'+').replace(/_/g,'/');
    while (b64.length % 4) b64 += '=';
    const bin = atob(b64);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return bytes;
  }
  if (params.get('j')) {
    try { return JSON.parse(new TextDecoder().decode(tokenToBytes(params.get('j')))); } catch(e) { return null; }
  }
  try {
    const bytes = tokenToBytes(token);
    const ds = new DecompressionStream('deflate');
    const writer = ds.writable.getWriter(); const reader = ds.readable.getReader();
    writer.write(bytes); writer.close();
    const chunks = [];
    while (true) { const {value, done} = await reader.read(); if (done) break; if (value) chunks.push(value); }
    let len = chunks.reduce((a,b) => a+b.length, 0), out = new Uint8Array(len), off = 0;
    for (const c of chunks) { out.set(c, off); off += c.length; }
    return JSON.parse(new TextDecoder().decode(out));
  } catch(e) {
    try { return JSON.parse(new TextDecoder().decode(tokenToBytes(token))); } catch(err) { return null; }
  }
}

// ═══════════════════════════════════════════
// 5. 构建与计算布局
// ═══════════════════════════════════════════
function addNode(list, map, id, label, type, entity) {
  id = canon(id); if (!id) return;
  if (map.has(id)) { Object.assign(map.get(id).entity || {}, entity || {}); return; }
  const n = { id, label: cleanText(label || id), type, entity: entity || {} };
  list.push(n); map.set(id, n);
}

function buildGraph(data) {
  if (data && data.graph_json) data = typeof data.graph_json === 'string' ? JSON.parse(data.graph_json) : data.graph_json;
  const nodes = [], map = new Map(), alias = new Map();
  const e = data.entities || {}, meta = data.meta || {};
  const jobName = cleanText(meta.job_title || e.job?.name || 'AI数据标注师');

  addNode(nodes, map, e.industry_chain?.name || '人工智能基础数据服务产业', e.industry_chain?.name || '人工智能基础数据服务产业', 'industry_chain', e.industry_chain);
  addNode(nodes, map, e.job_group?.name || '数据标注', e.job_group?.name || '数据标注', 'job_group', e.job_group);
  addNode(nodes, map, jobName, jobName, 'job', e.job);

  [e.industry_chain?.name, e.job_group?.name, e.job?.name, meta.job_title].forEach(v => { if (canon(v)) alias.set(canon(v), canon(jobName)); });
  (e.job_specializations || []).forEach(x => addNode(nodes, map, x.id, x.name, 'job_specialization', x));
  (e.tasks || []).forEach(x => addNode(nodes, map, x.id, x.name, 'task', x));
  (e.competencies || []).forEach(x => addNode(nodes, map, x.id, x.name, 'competency', x));
  (e.skills || []).forEach(x => addNode(nodes, map, x.id, x.name, 'skill', x));

  const links = [], seen = new Set();
  (data.edges || []).forEach(edge => {
    let s = alias.get(canon(edge.source)) || canon(edge.source);
    let t = alias.get(canon(edge.target)) || canon(edge.target);
    if (!map.has(s) || !map.has(t)) return;
    const k = s + '>' + t + '>' + cleanText(edge.relation || 'RELATED_TO');
    if (!seen.has(k)) { seen.add(k); links.push({ source: s, target: t, relation: cleanText(edge.relation || 'RELATED_TO') }); }
  });
  return { nodes, links, meta: { ...meta, job_title: jobName } };
}

function computeLayout() {
  const groups = Object.fromEntries(ORDER.map(t => [t, graph.nodes.filter(n => n.type === t)]));
  const maxN = Math.max(...Object.values(groups).map(a => a.length), 1);
  const colGap = 185, startX = 85, top = 130, rowGap = 55;

  layout.w = startX * 2 + colGap * (ORDER.length - 1) + 190;
  layout.h = Math.max(820, top + maxN * rowGap + 120);
  layout.nodes = new Map();

  ORDER.forEach((type, ci) => {
    const arr = groups[type] || [];
    const x = startX + ci * colGap;
    const total = (arr.length - 1) * rowGap;
    const base = Math.max(top, (layout.h - total) / 2);
    arr.sort((a, b) => a.id.localeCompare(b.id, 'zh-CN')).forEach((n, i) => {
      layout.nodes.set(n.id, { x, y: base + i * rowGap, w: type === 'skill' ? 174 : 176, h: 42 });
    });
  });
}

function visibleNode(n) {
  const keepTypes = ['industry_chain', 'job_group', 'job', 'job_specialization'];
  const f = activeFilter === 'all' || n.type === activeFilter || keepTypes.includes(n.type);
  const q = !searchText || n.label.toLowerCase().includes(searchText) || n.id.toLowerCase().includes(searchText);
  return { show: f, match: q, visible: f && q };
}

function edgePath(a, b) {
  const pa = layout.nodes.get(a), pb = layout.nodes.get(b);
  if (!pa || !pb) return '';
  const x1 = pa.x + pa.w, y1 = pa.y + pa.h / 2;
  const x2 = pb.x, y2 = pb.y + pb.h / 2;
  return `M${x1},${y1} C${x1 + Math.max(70, (x2 - x1) * 0.5)},${y1} ${x2 - Math.max(70, (x2 - x1) * 0.5)},${y2} ${x2},${y2}`;
}

// ═══════════════════════════════════════════
// 6. SVG 渲染主逻辑
// ═══════════════════════════════════════════
function render() {
  computeLayout();
  const svg = document.getElementById('graph');
  const view = document.getElementById('viewport');
  view.innerHTML = '';

  const ns = 'http://www.w3.org/2000/svg';
  
  // 注入滤镜
  let defs = svg.querySelector('defs');
  if(!defs) {
    defs = document.createElementNS(ns, 'defs');
    svg.appendChild(defs);
  }
  defs.innerHTML = `
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%"><feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#60a5fa" flood-opacity="0.45"/></filter>
    <filter id="yellowGlow" x="-50%" y="-50%" width="200%" height="200%"><feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#facc15" flood-opacity="0.45"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="rgba(148,163,184,.38)"></path></marker>
  `;

  // 绘制列背景线与列标题
  const colGapV = 185, startXV = 85;
  ORDER.forEach((type, ci) => {
    const x = startXV + ci * colGapV;
    const line = document.createElementNS(ns, 'line');
    line.setAttribute('x1', x + 88); line.setAttribute('x2', x + 88); line.setAttribute('y1', '82'); line.setAttribute('y2', layout.h - 56);
    line.setAttribute('class', 'column-line');
    view.appendChild(line);

    const title = document.createElementNS(ns, 'text');
    title.setAttribute('x', x + 88); title.setAttribute('y', '72'); title.setAttribute('text-anchor', 'middle'); title.setAttribute('class', 'column-title');
    title.textContent = TYPE_INFO[type].label;
    view.appendChild(title);
  });

  // 连线层
  const edgeLayer = document.createElementNS(ns, 'g');
  view.appendChild(edgeLayer);
  graph.links.forEach(l => {
    const s = graph.nodes.find(n => n.id === l.source), t = graph.nodes.find(n => n.id === l.target);
    if (!s || !t) return;
    const vs = visibleNode(s), vt = visibleNode(t);
    const p = document.createElementNS(ns, 'path');
    p.setAttribute('d', edgePath(l.source, l.target));
    p.setAttribute('class', 'edge' + ((vs.visible && vt.visible) ? '' : ' dim'));
    p.setAttribute('marker-end', 'url(#arrow)');
    edgeLayer.appendChild(p);
  });

  // 节点层
  const nodeLayer = document.createElementNS(ns, 'g');
  view.appendChild(nodeLayer);
  graph.nodes.forEach(n => {
    const pos = layout.nodes.get(n.id); if (!pos) return;
    const v = visibleNode(n);
    const g = document.createElementNS(ns, 'g');
    g.setAttribute('class', 'node' + (!v.visible ? ' dim' : '') + (searchText && v.match ? ' highlight' : ''));
    g.setAttribute('transform', `translate(${pos.x},${pos.y})`);
    g.onclick = (e) => { e.stopPropagation(); showDetail(n); };

    const rect = document.createElementNS(ns, 'rect');
    rect.setAttribute('class', 'node-card'); rect.setAttribute('width', pos.w); rect.setAttribute('height', pos.h);
    g.appendChild(rect);

    const dot = document.createElementNS(ns, 'circle');
    dot.setAttribute('class', 'node-dot'); dot.setAttribute('cx', '17'); dot.setAttribute('cy', '21'); dot.setAttribute('r', '6');
    dot.setAttribute('fill', TYPE_INFO[n.type].color);
    g.appendChild(dot);

    const title = document.createElementNS(ns, 'text');
    title.setAttribute('class', 'node-title'); title.setAttribute('x', '32'); title.setAttribute('y', '19');
    title.textContent = truncate(n.label, n.type === 'skill' ? 12 : 13);
    g.appendChild(title);

    const m = document.createElementNS(ns, 'text');
    m.setAttribute('class', 'node-meta'); m.setAttribute('x', '32'); m.setAttribute('y', '34');
    m.textContent = (n.entity.level ? n.entity.level + ' · ' : '') + (n.entity.category || n.entity.type || TYPE_INFO[n.type].label);
    g.appendChild(m);

    nodeLayer.appendChild(g);
  });

  updateStats();
  applyTransform();
  document.getElementById('emptyState').style.display = 'none';
}

// ═══════════════════════════════════════════
// 7. 精确平移缩放逻辑 (不影响字体的矩阵变换)
// ═══════════════════════════════════════════
function applyTransform() {
  const view = document.getElementById('viewport');
  if(view) {
    view.setAttribute('transform', `matrix(${transformState.scale}, 0, 0, ${transformState.scale}, ${transformState.x}, ${transformState.y})`);
  }
}

const wrap = document.getElementById('wrap');

// 鼠标按下：启动拖拽
wrap.addEventListener('mousedown', e => {
  if (e.button !== 0) return; // 仅左键可拖拽
  isDragging = true;
  startPan = { x: e.clientX - transformState.x, y: e.clientY - transformState.y };
});

// 鼠标移动中
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  transformState.x = e.clientX - startPan.x;
  transformState.y = e.clientY - startPan.y;
  applyTransform();
});

// 释放鼠标
window.addEventListener('mouseup', () => { isDragging = false; });

// 鼠标滚轮缩放
wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const zoomFactor = 1.1;
  const rect = wrap.getBoundingClientRect();
  const mouseX = e.clientX - rect.left;
  const mouseY = e.clientY - rect.top;

  // 计算当前的画布内坐标位置
  const graphX = (mouseX - transformState.x) / transformState.scale;
  const graphY = (mouseY - transformState.y) / transformState.scale;

  // 缩放计算
  if (e.deltaY < 0) {
    transformState.scale = Math.min(3, transformState.scale * zoomFactor);
  } else {
    transformState.scale = Math.max(0.3, transformState.scale / zoomFactor);
  }

  // 保证鼠标指针所指点的位置在缩放前后保持不动
  transformState.x = mouseX - graphX * transformState.scale;
  transformState.y = mouseY - graphY * transformState.scale;
  applyTransform();
}, { passive: false });

// 自动回到中心/重置视野
document.getElementById('resetBtn').onclick = () => {
  const containerW = wrap.clientWidth;
  const containerH = wrap.clientHeight;
  
  // 完美计算缩放比，自适应视口
  const scaleX = containerW / layout.w;
  const scaleY = containerH / layout.h;
  transformState.scale = Math.min(scaleX, scaleY, 0.95);
  
  // 居中
  transformState.x = (containerW - layout.w * transformState.scale) / 2;
  transformState.y = (containerH - layout.h * transformState.scale) / 2;
  applyTransform();
};

// 监听窗口大小改变自适应调整中心
window.onresize = () => { if(graph.nodes.length) document.getElementById('resetBtn').click(); };

// ═══════════════════════════════════════════
// 8. 其他交互与面板管理
// ═══════════════════════════════════════════
function showDetail(n) {
  const c = TYPE_INFO[n.type]; const e = n.entity || {}; const rows = [];
  ['description', 'summary'].forEach(k => { if (e[k]) rows.push(`<p>${cleanText(e[k])}</p>`); });
  if (e.category)  rows.push(`<p><b>分类：</b>${cleanText(e.category)}</p>`);
  if (e.data_type) rows.push(`<p><b>数据类型：</b>${cleanText(e.data_type)}</p>`);
  if (e.level)     rows.push(`<p><b>等级：</b>${cleanText(e.level)}</p>`);
  if (e.type)      rows.push(`<p><b>特性类型：</b>${cleanText(e.type)}</p>`);
  if (e.tool_related && e.tool_related !== 'None') rows.push(`<p><b>相关工具：</b>${cleanText(e.tool_related)}</p>`);
  if (e.difficulty) rows.push(`<p><b>难度：</b>${cleanText(e.difficulty)}</p>`);
  
  document.getElementById('detailContent').innerHTML = `
    <h2 style="color:${c.color}">${cleanText(n.label)}</h2>
    <div class="tag" style="background:${c.color}22;color:${c.color}"><span class="legend-dot" style="background:${c.color}"></span>${c.label}</div>
    ${rows.join('') || '<p>暂无详细描述。</p>'}
  `;
  document.getElementById('detail').classList.add('show');
}

function updateStats() {
  const counts = Object.fromEntries(ORDER.map(t => [t, graph.nodes.filter(n => n.type === t).length]));
  document.getElementById('stats').innerHTML = `
    <div class="stat-row"><span class="legend-dot" style="background:#fb7185"></span>岗位链：${counts.industry_chain + counts.job_group + counts.job}</div>
    <div class="stat-row"><span class="legend-dot" style="background:#a78bfa"></span>岗位方向：${counts.job_specialization || 0}</div>
    <div class="stat-row"><span class="legend-dot" style="background:#f59e0b"></span>工作任务：${counts.task}</div>
    <div class="stat-row"><span class="legend-dot" style="background:#38bdf8"></span>能力项：${counts.competency}</div>
    <div class="stat-row"><span class="legend-dot" style="background:#22c55e"></span>技能点：${counts.skill}</div>
    <div class="stat-row">关系：${graph.links.length}</div>
  `;
  document.getElementById('subtitle').textContent = (graph.meta?.job_title || '岗位') + ' · 方向、任务、能力、技能关系图谱';
}

function toast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1600);
}

document.querySelectorAll('.btn[data-filter]').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('.btn[data-filter]').forEach(x => x.classList.remove('active'));
    b.classList.add('active'); activeFilter = b.dataset.filter; render();
  };
});

document.getElementById('searchInput').oninput = e => { searchText = e.target.value.trim().toLowerCase(); render(); };
document.getElementById('copyBtn').onclick = () => navigator.clipboard.writeText(location.href).then(() => toast('链接已复制')).catch(() => toast('复制失败'));
document.getElementById('closeDetail').onclick = () => document.getElementById('detail').classList.remove('show');
wrap.onclick = () => document.getElementById('detail').classList.remove('show');

// ═══════════════════════════════════════════
// 9. 拖拽外部 JSON
// ═══════════════════════════════════════════
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault(); const file = e.dataTransfer.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      graph = buildGraph(JSON.parse(ev.target.result)); render();
      document.getElementById('sourcePill').innerHTML = '已加载文件<br/>' + file.name;
      setTimeout(() => document.getElementById('resetBtn').click(), 60);
    } catch (err) { alert('JSON 解析失败: ' + err.message); }
  };
  reader.readAsText(file);
});

// ═══════════════════════════════════════════
// 10. 初始化与启动
// ═══════════════════════════════════════════
(async function init() {
  let data = EMBEDDED_DATA; let sourceText = '内置示例数据<br/>可拖入 JSON 或分享链接替换';
  const urlData = await decodeURLData();
  if (urlData) { data = urlData; sourceText = 'URL 数据已加载<br/>可直接分享此链接'; }
  graph = buildGraph(data);
  document.getElementById('sourcePill').innerHTML = sourceText;
  render();
  setTimeout(() => document.getElementById('resetBtn').click(), 120);
})();
</script>
</body>
